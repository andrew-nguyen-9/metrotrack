name: ci

on:
  pull_request:
  push:
    branches: [main]

# ponytail: one workflow, three jobs mirroring the local gates (selftest, dbt build,
# astro build). Lighthouse budget gate is added in v1.0.5.
env:
  ASTRO_TELEMETRY_DISABLED: "1"
  DO_NOT_TRACK: "1"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - name: selftest (GATE 1)
        run: uv run python pipeline/selftest.py
      - name: dbt build (GATE 2)
        working-directory: transform
        env:
          DBT_PROFILES_DIR: .
        run: uv run --project .. dbt build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: astro check + build (GATE 3)
        run: |
          npx astro check
          npx astro build
