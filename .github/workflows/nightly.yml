name: nightly

# Full refresh: extract → transform+test → load the Supabase spine → rebuild
# tiles → redeploy the `metrotrack` Vercel project (serves transit.an9.dev).
# Runs on a schedule (and on demand). Emails on failure. Secrets required:
#   SUPABASE_A_DB_URL   — direct Postgres URL for Project A (gold load)
#   VERCEL_TOKEN        — Vercel access token
#   VERCEL_ORG_ID       — Vercel org id   (team_l1XTfSv1TIiBFAwM5JmkgzJ3)
#   VERCEL_PROJECT_ID   — `metrotrack` project id (prj_WdPrwVDC3jzBQZBSoj0Lo9AQVIe1)
#   SMTP_HOST/SMTP_PORT/SMTP_USERNAME/SMTP_PASSWORD — mail relay for alerts
#   ALERT_EMAIL         — where failure alerts are sent
on:
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC ≈ 02:00–03:00 America/Chicago
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: false

# Least privilege: refresh only reads the repo; notify-failure needs nothing.
permissions:
  contents: read

env:
  ASTRO_TELEMETRY_DISABLED: "1"
  DO_NOT_TRACK: "1"

jobs:
  # Read the live metros from the authored config so the matrix is data-driven
  # (status='live' in metros/*.toml). A "soon" metro is listed but never refreshed. [H11a]
  discover:
    runs-on: ubuntu-latest
    outputs:
      metros: ${{ steps.list.outputs.metros }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - id: list
        name: List live metros → matrix
        run: |
          metros=$(uv run python -c "import json, pipeline.metros as m; print(json.dumps([s for s in m.list_metros() if m.load_metro(s).status == 'live']))")
          echo "metros=$metros" >> "$GITHUB_OUTPUT"
          echo "live metros: $metros"

  # One independent refresh per live metro. fail-fast:false so a dark feed in one
  # metro never sinks the others [H12a]; max-parallel:1 staggers the fleet across the
  # free Actions minutes [I5a]. Each metro verifies its own data before it publishes.
  refresh:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        metro: ${{ fromJSON(needs.discover.outputs.metros) }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync

      - name: Install tippecanoe
        run: |
          git clone --depth 1 https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          make -C /tmp/tippecanoe -j2
          sudo make -C /tmp/tippecanoe install

      - name: Extract GTFS → bronze (full feeds)
        run: uv run python pipeline/gtfs.py --metro=${{ matrix.metro }}

      - name: dbt build (silver + gold + tests)
        working-directory: transform
        env:
          DBT_PROFILES_DIR: .
          METRO: ${{ matrix.metro }}
        # Block scalar + env var: dbt --vars takes YAML, and "{metro: x}" can't sit
        # in a plain run: scalar (the colon reads as a mapping).
        run: |
          uv run --project .. dbt build --vars "{metro: $METRO}"

      - name: Integrity + freshness gate — fail loud if a figure is untraceable or a feed went dark
        # verify_metro subsumes the old freshness check: every published figure must
        # trace to a bronze source row + the operator floor must hold. [H13a, K6a]
        run: uv run python pipeline/checks.py --metro=${{ matrix.metro }}

      - name: Load gold → Supabase Project A
        env:
          SUPABASE_A_DB_URL: ${{ secrets.SUPABASE_A_DB_URL }}
        run: uv run python pipeline/load.py --metro=${{ matrix.metro }}

      - name: Rebuild PMTiles + table JSON
        run: uv run python pipeline/tiles.py --metro=${{ matrix.metro }}

      - name: Upload this metro's tiles + table JSON
        uses: actions/upload-artifact@v4
        with:
          name: metro-${{ matrix.metro }}
          path: |
            frontend/public/${{ matrix.metro }}/transit.pmtiles
            frontend/src/data/${{ matrix.metro }}/transit.json
          if-no-files-found: error

  # One Astro build over every metro that refreshed, then one production deploy.
  # `always()` so a partial fleet still ships the metros that did refresh [H12a];
  # download-artifact pulls each refreshed metro's tiles back into the tree.
  deploy:
    needs: refresh
    if: always() && needs.refresh.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: metro-*
          path: /tmp/metros
      - name: Place each metro's artifacts into the tree
        run: |
          for d in /tmp/metros/metro-*; do
            slug=$(basename "$d" | sed 's/^metro-//')
            mkdir -p "frontend/public/$slug" "frontend/src/data/$slug"
            cp "$d/transit.pmtiles" "frontend/public/$slug/" 2>/dev/null || true
            cp "$d/transit.json" "frontend/src/data/$slug/" 2>/dev/null || true
          done

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npx astro build

      - name: Redeploy the metrotrack project (production)
        # Run from the repo ROOT, not frontend/. The Vercel project's Root Directory
        # is already `frontend`, so the CLI appends it once → it reads the prebuilt
        # `frontend/.vercel/output` that `astro build` wrote above. Running from
        # frontend/ made the CLI resolve `frontend/frontend` (double-nest) and fail.
        # VERCEL_ORG_ID + VERCEL_PROJECT_ID bind the CLI to the `metrotrack`
        # project explicitly (no .vercel link needed); --prod aliases transit.an9.dev.
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN"

  notify-failure:
    needs: [discover, refresh, deploy]
    if: failure()
    runs-on: ubuntu-latest
    permissions: {} # no GITHUB_TOKEN scopes — a compromised mail action gets nothing
    steps:
      - name: Email on failure
        # Pinned to a full commit SHA (supply-chain hardening); bump deliberately.
        uses: dawidd6/action-send-mail@94de994a9f6fffee200243214e17002e2920bb59 # v18
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: MetroTrack CI <${{ secrets.SMTP_USERNAME }}>
          to: ${{ secrets.ALERT_EMAIL }}
          subject: "MetroTrack nightly failed — run ${{ github.run_id }}"
          body: |
            The nightly refresh failed.

            Repo:  ${{ github.repository }}
            Run:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Check the failing step (extract / dbt / freshness floor / load / deploy)
            in the run log above.
