name: metrotrack
version: "1.0.0"
config-version: 2

profile: metrotrack

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

# Medallion layers. Bronze is parquet on disk (pipeline/), read via DuckDB sources;
# dbt owns silver (typed, deduped, geometry-validated) and gold (serving marts).
models:
  metrotrack:
    silver:
      +materialized: view
    gold:
      +materialized: table
