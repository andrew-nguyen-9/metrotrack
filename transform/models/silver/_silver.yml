version: 2

models:
  - name: silver_stops
    description: Typed, deduped, validated GTFS stops — one point per authority + stop_id (SRID 4326).
    columns:
      - name: authority_id
        tests: [not_null]
      - name: stop_id
        tests: [not_null]
  - name: silver_routes
    description: GTFS routes with geometry stitched from shapes (MultiLineString, SRID 4326).
    columns:
      - name: authority_id
        tests: [not_null]
      - name: route_id
        tests: [not_null]
  - name: silver_hex_metrics
    description: Jobs + population aggregated to H3 cells over Cook County (res = h3_res var).
    columns:
      - name: h3
        tests: [not_null, unique]   # one row per hex cell (cell uniqueness)
      - name: jobs
        tests: [not_null]
      - name: population
        tests: [not_null]
  - name: silver_funding
    description: Operating expense per service board × fiscal year — NTD audited actuals joined to the RTA adopted budget/plan (one row per authority+year).
    columns:
      - name: authority_id
        tests: [not_null]
      - name: fiscal_year
        tests: [not_null]
